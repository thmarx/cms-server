name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25-ea'
        distribution: 'temurin'
        cache: maven

    # Playwright-Binaries cachen → automatischer Download beim ersten Playwright.create()
    - name: Cache Playwright browsers
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ hashFiles('**/pom.xml') }}
        restore-keys: playwright-

    # Systembibliotheken für Chromium direkt via apt – kein Maven-Classpath-Problem
    - name: Install Chromium system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libglib2.0-0 \
          libnss3 \
          libnspr4 \
          libatk1.0-0 \
          libatk-bridge2.0-0 \
          libcups2 \
          libdrm2 \
          libdbus-1-3 \
          libxkbcommon0 \
          libxcomposite1 \
          libxdamage1 \
          libxfixes3 \
          libxrandr2 \
          libgbm1 \
          libasound2t64

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # Test-Reports bei Fehler als Artifact sichern
    - name: Upload Surefire Reports
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: surefire-reports
        path: target/surefire-reports/
        retention-days: 7
